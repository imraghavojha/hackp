<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Support Reply Drafter</title>
    <style>
      :root { --bg:#f3f4f6; --surface:#ffffff; --fg:#111827; --muted:#6b7280; --border:#d1d5db; --accent:#1d4ed8; }
      body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 "IBM Plex Sans", sans-serif; }
      main { max-width:860px; margin:40px auto; padding:24px; }
      .shell { border:1px solid var(--border); border-radius:18px; padding:24px; background:var(--surface); box-shadow:0 12px 28px rgba(15,23,42,0.08); }
      textarea, pre { width:100%; box-sizing:border-box; min-height:180px; margin-top:16px; border-radius:14px; border:1px solid var(--border); background:#ffffff; color:var(--fg); padding:14px; font:inherit; }
      button { margin-top:16px; border:0; border-radius:999px; padding:12px 18px; background:var(--accent); color:#ffffff; font-weight:700; cursor:pointer; }
      .muted { color:var(--muted); margin-top:12px; }
    </style>
  </head>
  <body>
    <main>
      <section class="shell">
        <h1>Draft Customer Reply</h1>
        <p>Paste a JSON object with `ticket` and `customer`, then get a calm reply draft.</p>
        <textarea id="input-area" placeholder='{"ticket":{"ticket_id":"TICK-1"},"customer":{"name":"Jordan"}}'></textarea>
        <button id="run-button">Draft Reply</button>
        <div class="muted" id="status">Paste JSON input to begin.</div>
        <pre id="preview">Draft preview will appear here.</pre>
      </section>
    </main>
    <script>
      window.Tool = {
        metadata: {
          id: "tool_reply_drafter_v1",
          name: "Support Reply Drafter",
          version: "1.0",
          input_type: "json",
          output_type: "text"
        },
        defaultConfig: {
          tone: "calm and direct",
          signoff: "Best,\nKai"
        },
        async transform(input, config = {}) {
          const merged = { ...this.defaultConfig, ...config }
          const payload = JSON.parse(String(input || "{}"))
          const ticket = payload.ticket || {}
          const customer = payload.customer || {}
          return [
            `Hi ${customer.name || "there"},`,
            "",
            `I'm sorry about the issue described in ticket ${ticket.ticket_id || "unknown"}.`,
            `I reviewed the note about "${ticket.subject || "your request"}" and I'm moving this forward with priority.`,
            `Because you're on the ${customer.plan || "current"} plan, I'll follow up as soon as I have the next update.`,
            "",
            merged.signoff,
            `Tone: ${merged.tone}`
          ].join("\\n")
        }
      }

      const input = document.getElementById("input-area")
      const preview = document.getElementById("preview")
      const status = document.getElementById("status")
      document.getElementById("run-button").addEventListener("click", async () => {
        try {
          preview.textContent = await window.Tool.transform(input.value)
          status.textContent = "Draft ready to copy."
        } catch (error) {
          preview.textContent = `Error: ${error.message}`
          status.textContent = "Input needs valid JSON."
        }
      })
    </script>
  </body>
</html>
